name: Build Custom Injector

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Locate MSVC and Compile Injector
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cl.exe /EHsc /O2 /MT injector.cpp /link /OUT:StandChillow_Injector.exe

    - name: Upload Injector Executable
      uses: actions/upload-artifact@v4
      with:
        name: StandChillow_Injector
        path: StandChillow_Injector.exe
